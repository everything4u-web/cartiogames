<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartio Play</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  transition:0.4s;
}

/* DARK MODE DEFAULT */
body.dark {
  background:#0f172a;
  color:white;
}

/* LIGHT MODE */
body.light {
  background:#f1f5f9;
  color:#111;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:linear-gradient(90deg,#22c55e,#06b6d4);
  color:white;
}

button {
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  border-radius:15px;
  padding:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

iframe {
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

h2 {
  text-align:center;
}

</style>
</head>

<body class="dark">

<header>
<h1>🎮 Cartio Play</h1>
<button onclick="toggleMode()">🌙 / ☀️</button>
</header>

<div class="container">

<div class="card">
<h2>🚗 Car Game</h2>
<iframe src="https://www.crazygames.com/embed/madalin-stunt-cars-2"></iframe>
</div>

<div class="card">
<h2>🏃 Subway Game</h2>
<iframe src="https://www.crazygames.com/embed/subway-surfers"></iframe>
</div>

<div class="card">
<h2>🔫 Shooting Game</h2>
<iframe src="https://www.crazygames.com/embed/forward-assault-remix"></iframe>
</div>

<div class="card">
<h2>🧠 Puzzle Game</h2>
<iframe src="https://www.crazygames.com/embed/2048"></iframe>
</div>

</div>

<script>
function toggleMode() {
  let body = document.body;
  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
  } else {
    body.classList.remove("light");
    body.classList.add("dark");
  }
}
</script>

</body>
  </html>
